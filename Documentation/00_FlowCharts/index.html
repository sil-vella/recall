<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowCharts</title>
  <link rel="stylesheet" href="css/flowcharts.css">
  <style media="print">
    @page { size: A4; margin: 15mm; }
    header, .flowcharts-header { display: none !important; }
  </style>
</head>
<body>
  <header class="flowcharts-header" id="flowcharts-header" aria-hidden="false">
    <div class="header-inner">
      <a href="index.html" class="logo">FlowCharts</a>
      <nav id="flowcharts-nav" class="flowcharts-nav" aria-label="Charts navigation">
        <ul>
<li><button type="button" class="nav-folder" aria-haspopup="true" aria-expanded="false">End To End</button><ul>
<li><button type="button" class="nav-folder" aria-haspopup="true" aria-expanded="false">Notification Sys</button><ul>
<li><a href="charts/end-to-end/notification_sys/notification-sys.html">Notification Sys</a></li>
</ul></li>
<li><button type="button" class="nav-folder" aria-haspopup="true" aria-expanded="false">Tournaments</button><ul>
<li><a href="charts/end-to-end/tournaments/admin-invite-play-flow.html">Admin Invite Play Flow</a></li>
<li><a href="charts/end-to-end/tournaments/data-model.html">Data Model</a></li>
</ul></li>
</ul></li>
<li><button type="button" class="nav-folder" aria-haspopup="true" aria-expanded="false">Example</button><ul>
<li><a href="charts/example/sample.html">Sample</a></li>
</ul></li>
</ul>
      </nav>
    </div>
  </header>
  <main class="flowcharts-main">
    <h1>FlowCharts</h1>
    <p>Pick a chart from the nav to view. Run <code>scripts/build_nav_and_charts.py</code> to regenerate the nav and chart pages from the <code>charts/</code> directory.</p>
  </main>
  <script>
    (function() {
      var el = document.getElementById('flowcharts-header');
      if (!el) return;
      function hide() { el.style.display = 'none'; el.setAttribute('aria-hidden', 'true'); }
      function show() { el.style.display = ''; el.setAttribute('aria-hidden', 'false'); }
      window.addEventListener('beforeprint', hide);
      window.addEventListener('afterprint', show);
    })();
  </script>
</body>
</html>
