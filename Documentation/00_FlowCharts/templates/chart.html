<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{CHART_TITLE}} | FlowCharts</title>
  <link rel="stylesheet" href="{{ROOT_REL}}css/flowcharts.css">
  <style media="print">
    @page { size: A4; margin: 15mm; }
    header, .flowcharts-header { display: none !important; }
  </style>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'base' });
  </script>
</head>
<body>
  <header class="flowcharts-header" id="flowcharts-header" aria-hidden="false">
    <div class="header-inner">
      <a href="{{ROOT_REL}}index.html" class="logo">FlowCharts</a>
      <nav id="flowcharts-nav" class="flowcharts-nav" aria-label="Charts navigation">
        {{NAV_CONTENT}}
      </nav>
    </div>
  </header>
  <main class="flowcharts-main">
    <h1>{{CHART_TITLE}}</h1>
    <div class="mermaid">
{{MERMAID_SOURCE}}
    </div>
  </main>
  <script>
    (function() {
      var el = document.getElementById('flowcharts-header');
      if (!el) return;
      function hide() { el.style.display = 'none'; el.setAttribute('aria-hidden', 'true'); }
      function show() { el.style.display = ''; el.setAttribute('aria-hidden', 'false'); }
      window.addEventListener('beforeprint', hide);
      window.addEventListener('afterprint', show);
    })();
  </script>
</body>
</html>
