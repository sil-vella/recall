# Predefined Hands Configuration
# player_0..2: jack + queen + ace + one number (standard deck, unique suits)
# player_3+: random deal (omit from hands)
enabled: true

hands:
  player_0:
    - rank: "jack"
      suit: "hearts"
    - rank: "queen"
      suit: "hearts"
    - rank: "ace"
      suit: "hearts"
    - rank: "5"
      suit: "spades"

  player_1:
    - rank: "jack"
      suit: "diamonds"
    - rank: "queen"
      suit: "diamonds"
    - rank: "ace"
      suit: "diamonds"
    - rank: "7"
      suit: "clubs"

  player_2:
    - rank: "jack"
      suit: "clubs"
    - rank: "queen"
      suit: "clubs"
    - rank: "ace"
      suit: "clubs"
    - rank: "9"
      suit: "diamonds"

# player_3 not listed — fourth seat is dealt randomly from the remaining deck

initial_discard:
  rank: "10"
  suit: "spades"
