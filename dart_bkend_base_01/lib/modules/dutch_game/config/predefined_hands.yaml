# Predefined Hands Configuration for Testing
# Enable/disable predefined hands dealing
enabled: true

# Predefined hands for each player (player_0 = four jacks; player_1 = two jacks + fillers; player_2 & player_3 = two 4s each)
hands:
  player_0:  # All jacks (one per suit)
    - rank: "jack"
      suit: "hearts"
    - rank: "jack"
      suit: "diamonds"
    - rank: "jack"
      suit: "clubs"
    - rank: "jack"
      suit: "spades"

  player_1:  # Two jacks (extra copies — testing deck has 4 jacks/suit) + two other cards
    - rank: "jack"
      suit: "hearts"
    - rank: "jack"
      suit: "diamonds"
    - rank: "king"
      suit: "hearts"
    - rank: "king"
      suit: "spades"

  player_2:  # Two 4s
    - rank: "4"
      suit: "hearts"
    - rank: "4"
      suit: "diamonds"
    - rank: "2"
      suit: "clubs"
    - rank: "3"
      suit: "spades"

  player_3:  # Two 4s
    - rank: "4"
      suit: "clubs"
    - rank: "4"
      suit: "spades"
    - rank: "5"
      suit: "diamonds"
    - rank: "5"
      suit: "clubs"

# Initial discard pile card (optional)
# If not specified, a random card will be used from the remaining deck
initial_discard:
  rank: "ace"
  suit: "clubs"
