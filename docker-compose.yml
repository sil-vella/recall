# Sensitive values: use .env next to this file (generated by playbooks/rop01/08 + templates/env.j2 from app_dev/.env.prod).
# Config.py uses env vars then defaults for non-sensitive; no secret files.

services:
  # MongoDB Service (for external app)
  dutch_mongodb-external:
    image: bitnami/mongodb:latest
    container_name: dutch_external_app_mongodb
    env_file: .env
    environment:
      - MONGODB_ROOT_USER=mongodb_admin
      - MONGODB_DATABASE=external_system
      - MONGODB_USERNAME=external_app_user
      - MONGODB_ROOT_PASSWORD=${MONGODB_ROOT_PASSWORD}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - "27018:27017"
    volumes:
      - /opt/apps/reignofplay/dutch/data/mongodb:/bitnami/mongodb
    networks:
      - app-network
    restart: unless-stopped

  # Redis Service (for external app)
  dutch_redis-external:
    image: bitnami/redis:latest
    container_name: dutch_external_app_redis
    user: "${VPS_APP_UID:-1000}:${VPS_APP_GID:-1000}"
    env_file: .env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - "6380:6379"
    volumes:
      - /opt/apps/reignofplay/dutch/data/redis:/bitnami/redis
    networks:
      - app-network
    restart: unless-stopped

  # External Flask Application (Production) – all config via env; defaults in config.py
  dutch_flask-external:
    image: silvella/dutch_flask_app:latest
    container_name: dutch_external_app_flask
    # Same UID/GID as Redis and bind-mounted host dirs (VPS .env from Ansible: rop01_user).
    # Required so AVATAR_STORAGE_DIR (/app/data/avatars) is writable; without this, root-owned mounts cause PermissionError.
    user: "${VPS_APP_UID:-1000}:${VPS_APP_GID:-1000}"
    env_file: .env
    ports:
      - "5001:5001"
    environment:
      - DEBUG_MODE=false
      - APP_URL=https://dutch.reignofplay.com
      - MONGODB_SERVICE_NAME=dutch_mongodb-external
      - MONGODB_PORT=27017
      - MONGODB_ROOT_USER=mongodb_admin
      - MONGODB_USER=external_app_user
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_DB_NAME=external_system
      - REDIS_HOST=dutch_redis-external
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DART_BACKEND_SERVICE_KEY=${DART_BACKEND_SERVICE_KEY}
      - DART_BACKEND_NOTIFY_URL=http://dutch_dart-game-server:8080
      - DUTCH_MT_DASHBOARD_SERVICE_KEY=${DUTCH_MT_DASHBOARD_SERVICE_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_PLAY_PACKAGE_NAME=${GOOGLE_PLAY_PACKAGE_NAME:-}
      - GOOGLE_PLAY_SERVICE_ACCOUNT_FILE=${GOOGLE_PLAY_SERVICE_ACCOUNT_FILE:-}
      - APP_VERSION=${APP_VERSION:-2.0.0}
      - APP_DOWNLOAD_BASE_URL=${APP_DOWNLOAD_BASE_URL:-https://dutch.reignofplay.com/downloads}
      - CREDIT_SYSTEM_API_KEY=${CREDIT_SYSTEM_API_KEY:-}
      - DUTCH_WINS_PER_USER_LEVEL=${DUTCH_WINS_PER_USER_LEVEL:-10}
      - DUTCH_LEVELS_PER_RANK=${DUTCH_LEVELS_PER_RANK:-5}
      - DUTCH_USER_LEVEL_MIN=${DUTCH_USER_LEVEL_MIN:-1}
      - DUTCH_RANK_HIERARCHY=${DUTCH_RANK_HIERARCHY:-beginner,novice,apprentice,skilled,advanced,expert,veteran,master,elite,legend}
      - DUTCH_TABLES_JSON=${DUTCH_TABLES_JSON}
      - MOBILE_RELEASE_MANIFEST=/app/data/mobile_release.json
      # Profile avatars: persist across container recreate (Flask serves GET /public/avatar-media/...)
      - AVATAR_STORAGE_DIR=/app/data/avatars
      - RATE_LIMIT_ENABLED=false
      - RATE_LIMIT_IP_REQUESTS=1000
      - RATE_LIMIT_IP_WINDOW=60
      - CREDIT_SYSTEM_URL=http://dutch_flask-external:5001
    volumes:
      - /opt/apps/reignofplay/dutch/data/mobile_release.json:/app/data/mobile_release.json:ro
      - /opt/apps/reignofplay/dutch/data/avatars:/app/data/avatars
    depends_on:
      - dutch_mongodb-external
      - dutch_redis-external
    networks:
      - app-network
    restart: unless-stopped

  # Prometheus Service (for metrics collection) – commented out, not used
  # Access via http://<host>:9090
  # dutch_prometheus:
  #   image: prom/prometheus:latest
  #   container_name: dutch_prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - /opt/apps/reignofplay/dutch/data/prometheus/config:/etc/prometheus
  #     - /opt/apps/reignofplay/dutch/data/prometheus/storage:/prometheus
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #     - '--web.console.libraries=/usr/share/prometheus/console_libraries'
  #     - '--web.console.templates=/usr/share/prometheus/consoles'
  #   networks:
  #     - app-network
  #   restart: unless-stopped

  # Grafana Service (for metrics visualization) – commented out, not used
  # Access via http://<host>:3001
  # dutch_grafana:
  #   image: grafana/grafana:latest
  #   container_name: dutch_grafana
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     - GF_SECURITY_ADMIN_USER=admin
  #     - GF_SECURITY_ADMIN_PASSWORD=admin
  #     - GF_INSTALL_PLUGINS=
  #   volumes:
  #     - /opt/apps/reignofplay/dutch/data/grafana:/var/lib/grafana
  #     - /opt/apps/reignofplay/dutch/data/grafana/provisioning:/etc/grafana/provisioning
  #     - /opt/apps/reignofplay/dutch/data/grafana/dashboards:/var/lib/grafana/dashboards
  #   depends_on:
  #     - dutch_prometheus
  #   networks:
  #     - app-network
  #   restart: unless-stopped

  # Dart Game WebSocket Server – service key via env
  dutch_dart-game-server:
    image: silvella/dutch_dart_game_server:latest
    container_name: dutch_dart_game_server
    env_file: .env
    environment:
      - PORT=8080
      - DART_BACKEND_SERVICE_KEY=${DART_BACKEND_SERVICE_KEY}
      - DUTCH_WINS_PER_USER_LEVEL=${DUTCH_WINS_PER_USER_LEVEL:-10}
      - DUTCH_LEVELS_PER_RANK=${DUTCH_LEVELS_PER_RANK:-5}
      - DUTCH_USER_LEVEL_MIN=${DUTCH_USER_LEVEL_MIN:-1}
      - DUTCH_RANK_HIERARCHY=${DUTCH_RANK_HIERARCHY:-beginner,novice,apprentice,skilled,advanced,expert,veteran,master,elite,legend}
      - DUTCH_TABLES_JSON=${DUTCH_TABLES_JSON}
    ports:
      - "8080:8080"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge 