# Promotional ads (in-app links). Types are registered first; ads reference ad_type_id.
#
# Media: put files under assets/adverts/ and reference by file name only, e.g. image: promo.png
# Optional video: video: clip.mp4 (fullscreen overlay prefers video over image when both set).

ad_event_types:
  - id: switch_screen
    hook_name: switch_screen_ad
    selection_strategy: round_robin
    delay_before_skip_seconds: 10

  - id: bottom_banner_promo
    hook_name: bottom_banner_bar_loaded
    selection_strategy: round_robin

ads:
  - id: switch_screen_intro
    ad_type_id: switch_screen
    link: "https://flutter.dev"
    title: "Switch screen promo"
    image: switch_promo.png
    # video: switch_promo.mp4

  - id: bottom_promo_one
    ad_type_id: bottom_banner_promo
    link: "https://flutter.dev/docs"
    title: "Banner promo 1"
    image: banner_one.png

  - id: bottom_promo_two
    ad_type_id: bottom_banner_promo
    link: "https://dart.dev"
    title: "Banner promo 2"
    image: banner_two.png
