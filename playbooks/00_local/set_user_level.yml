---
# Set a user's modules.dutch_game.level and modules.dutch_game.rank in local MongoDB by fixed user_id.
# Run:
#   ansible-playbook -i playbooks/00_local/inventory.ini playbooks/00_local/set_user_level.yml
- name: Load app_dev/.env.local for MongoDB and Dutch game mapping values (optional)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    local_env_path: "{{ playbook_dir }}/../../.env.local"
    mongodb_container_name: "dutch_external_app_mongodb"
  tasks:
    - name: Check if app_dev/.env.local exists
      stat:
        path: "{{ local_env_path }}"
      register: local_env_check

    - name: Parse app_dev/.env into JSON
      shell: |
        python3 << 'PYEOF'
        import json, os, re
        path = os.environ.get('LOCAL_ENV_PATH', '')
        out = {}
        if path and os.path.isfile(path):
            with open(path) as f:
                for line in f:
                    line = line.strip()
                    if not line or line.startswith('#'):
                        continue
                    m = re.match(r'^([A-Za-z_][A-Za-z0-9_]*)=(.*)$', line)
                    if m:
                        k, v = m.group(1), m.group(2).strip().strip('"').strip("'")
                        out[k] = v
        result = {
            'mongodb_password': out.get('MONGODB_PASSWORD', ''),
            'dutch_levels_per_rank': out.get('DUTCH_LEVELS_PER_RANK', ''),
            'dutch_rank_hierarchy': out.get('DUTCH_RANK_HIERARCHY', ''),
            'dutch_user_level_min': out.get('DUTCH_USER_LEVEL_MIN', '')
        }
        print(json.dumps(result))
        PYEOF
      register: env_json
      changed_when: false
      environment:
        LOCAL_ENV_PATH: "{{ local_env_path }}"
      when: local_env_check.stat.exists | default(false)

    - name: Set env facts from app_dev/.env.local
      set_fact:
        mongodb_password: "{{ (env_json.stdout | from_json).mongodb_password }}"
        dutch_levels_per_rank_env: "{{ (env_json.stdout | from_json).dutch_levels_per_rank }}"
        dutch_rank_hierarchy_env: "{{ (env_json.stdout | from_json).dutch_rank_hierarchy }}"
        dutch_user_level_min_env: "{{ (env_json.stdout | from_json).dutch_user_level_min }}"
      when: local_env_check.stat.exists | default(false) and env_json.stdout | length > 0

- name: Set user level and derived rank (local Docker)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_level_input
      prompt: "Enter target level (whole number >= 0)"
      private: false
  vars:
    mongodb_password: "{{ (hostvars['localhost'] | default({})).get('mongodb_password') or lookup('env', 'MONGODB_PASSWORD') | default('6R3jjsvVhIRP20zMiHdkBzNKx') }}"
    mongodb_container_name: "dutch_external_app_mongodb"
    target_user_id: "69aae0b0095ba0c771e43091"
    levels_per_rank: "{{ ((hostvars['localhost'] | default({})).get('dutch_levels_per_rank_env') | default('') | trim) or '5' }}"
    rank_hierarchy_csv: "{{ ((hostvars['localhost'] | default({})).get('dutch_rank_hierarchy_env') | default('') | trim) or 'beginner,novice,apprentice,skilled,advanced,expert,veteran,master,elite,legend' }}"
    user_level_min: "{{ ((hostvars['localhost'] | default({})).get('dutch_user_level_min_env') | default('') | trim) or '1' }}"
  tasks:
    - name: Validate target level input
      assert:
        that:
          - target_level_input is match('^[0-9]+$')
        fail_msg: "Level must be an integer >= 0."

    - name: Resolve mapping inputs and computed rank from target level
      set_fact:
        target_level: "{{ target_level_input | int }}"
        levels_per_rank_int: "{{ levels_per_rank | int }}"
        user_level_min_int: "{{ user_level_min | int }}"
        rank_hierarchy_list: "{{ rank_hierarchy_csv.split(',') | map('trim') | reject('equalto', '') | list }}"
        normalized_level: "{{ [user_level_min | int, target_level_input | int] | max }}"
        rank_index_raw: "{{ (([user_level_min | int, target_level_input | int] | max) - 1) // (levels_per_rank | int) }}"

    - name: Validate mapping inputs from .env/defaults
      assert:
        that:
          - (levels_per_rank_int | int) >= 1
          - (user_level_min_int | int) >= 0
          - rank_hierarchy_list | length > 0
        fail_msg: >-
          Invalid mapping inputs. Need DUTCH_LEVELS_PER_RANK >= 1,
          DUTCH_USER_LEVEL_MIN >= 0, and non-empty DUTCH_RANK_HIERARCHY.

    - name: Compute clamped rank index and target rank
      set_fact:
        rank_index: "{{ [0, [rank_index_raw | int, (rank_hierarchy_list | length) - 1] | min] | max }}"
        target_rank: "{{ rank_hierarchy_list[[0, [rank_index_raw | int, (rank_hierarchy_list | length) - 1] | min] | max] }}"

    - name: Lookup user by target user_id and read current level/rank
      shell: |
        docker exec {{ mongodb_container_name }} mongosh -u external_app_user -p "{{ mongodb_password }}" --authenticationDatabase external_system --quiet --eval "
        var d = db.getSiblingDB('external_system');
        var user = d.users.findOne(
          { _id: ObjectId('{{ target_user_id }}') },
          { _id: 1, email: 1, 'modules.dutch_game.level': 1, 'modules.dutch_game.rank': 1 }
        );
        if (!user) { print('NOT_FOUND'); quit(0); }
        var levelBefore = null;
        var rankBefore = null;
        if (user.modules && user.modules.dutch_game) {
          if (typeof user.modules.dutch_game.level !== 'undefined') {
            levelBefore = user.modules.dutch_game.level;
          }
          if (typeof user.modules.dutch_game.rank !== 'undefined') {
            rankBefore = user.modules.dutch_game.rank;
          }
        }
        print(JSON.stringify({
          user_id: user._id.valueOf(),
          email: user.email,
          level_before: levelBefore,
          rank_before: rankBefore
        }));
        "
      register: user_lookup_out
      changed_when: false

    - name: Extract lookup JSON line
      set_fact:
        user_lookup_json_line: "{{ (user_lookup_out.stdout_lines | select('match', '^\\{') | list | first) | default('') }}"

    - name: Fail if target user not found
      fail:
        msg: "User with _id '{{ target_user_id }}' not found."
      when: user_lookup_json_line | length == 0

    - name: Parse user lookup data
      set_fact:
        user_lookup_data: >-
          {{
            user_lookup_json_line
            if (user_lookup_json_line is mapping)
            else (user_lookup_json_line | from_json)
          }}

    - name: Update level, rank, and timestamps via mongosh
      shell: |
        docker exec {{ mongodb_container_name }} mongosh -u external_app_user -p "{{ mongodb_password }}" --authenticationDatabase external_system --quiet --eval "
        var d = db.getSiblingDB('external_system');
        var userId = '{{ user_lookup_data.user_id }}';
        var normalizedLevel = {{ normalized_level }};
        var targetRank = '{{ target_rank }}';
        var nowIso = new Date().toISOString();
        var result = d.users.updateOne(
          { _id: ObjectId(userId) },
          { \$set: {
              'modules.dutch_game.level': normalizedLevel,
              'modules.dutch_game.rank': targetRank,
              updated_at: nowIso,
              'modules.dutch_game.last_updated': nowIso
            }
          }
        );
        if (result.matchedCount === 0) { print('ERROR: User not found by _id ' + userId); quit(1); }
        print('OK: Updated level to ' + normalizedLevel + ' and rank to ' + targetRank + ' for user ' + userId);
        "
      register: level_rank_update_out
      changed_when: true

    - name: Read updated level/rank after update
      shell: |
        docker exec {{ mongodb_container_name }} mongosh -u external_app_user -p "{{ mongodb_password }}" --authenticationDatabase external_system --quiet --eval "
        var d = db.getSiblingDB('external_system');
        var userId = '{{ user_lookup_data.user_id }}';
        var user = d.users.findOne(
          { _id: ObjectId(userId) },
          { _id: 1, 'modules.dutch_game.level': 1, 'modules.dutch_game.rank': 1 }
        );
        if (!user) { print('NOT_FOUND'); quit(1); }
        var levelAfter = null;
        var rankAfter = null;
        if (user.modules && user.modules.dutch_game) {
          if (typeof user.modules.dutch_game.level !== 'undefined') {
            levelAfter = user.modules.dutch_game.level;
          }
          if (typeof user.modules.dutch_game.rank !== 'undefined') {
            rankAfter = user.modules.dutch_game.rank;
          }
        }
        print(JSON.stringify({
          user_id: user._id.valueOf(),
          level_after: levelAfter,
          rank_after: rankAfter
        }));
        "
      register: user_after_out
      changed_when: false

    - name: Extract after JSON line
      set_fact:
        user_after_json_line: "{{ (user_after_out.stdout_lines | select('match', '^\\{') | list | first) | default('') }}"

    - name: Parse after data
      set_fact:
        user_after_data: >-
          {{
            user_after_json_line
            if (user_after_json_line is mapping)
            else (user_after_json_line | from_json)
          }}

    - name: Show before/after summary and mapping inputs
      debug:
        msg:
          - "Email: {{ user_lookup_data.email }}"
          - "User ID: {{ user_lookup_data.user_id }}"
          - "Mapping inputs -> DUTCH_LEVELS_PER_RANK: {{ levels_per_rank_int }}, DUTCH_RANK_HIERARCHY: {{ rank_hierarchy_list | join(',') }}, DUTCH_USER_LEVEL_MIN: {{ user_level_min_int }}"
          - "Requested level input: {{ target_level }}"
          - "Computed normalizedLevel: {{ normalized_level }}"
          - "Computed rankIndex (raw): {{ rank_index_raw }}, rankIndex (clamped): {{ rank_index }}"
          - "Computed targetRank: {{ target_rank }}"
          - "Before -> level: {{ user_lookup_data.level_before }}, rank: {{ user_lookup_data.rank_before }}"
          - "After  -> level: {{ user_after_data.level_after }}, rank: {{ user_after_data.rank_after }}"
          - "Update output: {{ level_rank_update_out.stdout_lines | join(' ') }}"
