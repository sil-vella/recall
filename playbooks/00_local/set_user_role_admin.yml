---
# One-off: set user 69aae0b0095ba0c771e43091 (silvestervella) role to "admin".
# Run: ansible-playbook -i playbooks/00_local/inventory.ini playbooks/00_local/set_user_role_admin.yml
- name: Load app_dev/.env.local for MongoDB password (optional)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    local_env_path: "{{ playbook_dir }}/../../.env.local"
    mongodb_container_name: "dutch_external_app_mongodb"
  tasks:
    - name: Check if app_dev/.env.local exists
      stat:
        path: "{{ local_env_path }}"
      register: local_env_check

    - name: Parse app_dev/.env into JSON
      shell: |
        python3 << 'PYEOF'
        import json, os, re
        path = os.environ.get('LOCAL_ENV_PATH', '')
        out = {}
        if path and os.path.isfile(path):
            with open(path) as f:
                for line in f:
                    line = line.strip()
                    if not line or line.startswith('#'): continue
                    m = re.match(r'^([A-Za-z_][A-Za-z0-9_]*)=(.*)$', line)
                    if m:
                        k, v = m.group(1), m.group(2).strip().strip('"').strip("'")
                        out[k] = v
        result = { 'mongodb_password': out.get('MONGODB_PASSWORD', '') }
        print(json.dumps(result))
        PYEOF
      register: env_json
      changed_when: false
      environment:
        LOCAL_ENV_PATH: "{{ local_env_path }}"
      when: local_env_check.stat.exists | default(false)

    - name: Set env facts from app_dev/.env.local
      set_fact:
        mongodb_password: "{{ (env_json.stdout | from_json).mongodb_password }}"
      when: local_env_check.stat.exists | default(false) and env_json.stdout | length > 0

- name: Set user 69aae0b0095ba0c771e43091 role to admin (local Docker)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    mongodb_password: "{{ (hostvars['localhost'] | default({})).get('mongodb_password') or lookup('env', 'MONGODB_PASSWORD') | default('6R3jjsvVhIRP20zMiHdkBzNKx') }}"
    mongodb_container_name: "dutch_external_app_mongodb"
  tasks:
    - name: Create set_user_role_admin script
      copy:
        dest: "/tmp/set_user_role_admin.js"
        content: |
          var d = db.getSiblingDB("external_system");
          var userId = "69aae0b0095ba0c771e43091";
          var result = d.users.updateOne(
            { _id: ObjectId(userId) },
            { $set: { role: "admin", updated_at: new Date().toISOString() } }
          );
          if (result.matchedCount === 0) {
            print("ERROR: User with _id " + userId + " not found");
            quit(1);
          }
          if (result.modifiedCount === 1) {
            print("OK: Set role to 'admin' for user " + userId);
          } else {
            print("OK: User " + userId + " already had role 'admin' (no change)");
          }
        mode: '0644'

    - name: Copy script to MongoDB container
      shell: docker cp /tmp/set_user_role_admin.js {{ mongodb_container_name }}:/tmp/set_user_role_admin.js
      register: copy_out
      changed_when: copy_out.rc == 0

    - name: Run script in MongoDB container
      shell: |
        docker exec {{ mongodb_container_name }} mongosh -u external_app_user -p "{{ mongodb_password }}" --authenticationDatabase external_system --quiet /tmp/set_user_role_admin.js
      register: script_out
      changed_when: true

    - name: Show result
      debug:
        msg: "{{ script_out.stdout_lines }}"
