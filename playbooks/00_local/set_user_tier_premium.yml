---
# Set a user's subscription_tier in local MongoDB. Takes tier (and optional user_id) as arguments.
# Valid tiers: promotional, regular, premium (see tier_rank_level_matcher).
# Run:
#   ansible-playbook -i playbooks/00_local/inventory.ini playbooks/00_local/set_user_tier_premium.yml -e tier=premium
#   ansible-playbook -i playbooks/00_local/inventory.ini playbooks/00_local/set_user_tier_premium.yml -e tier=regular
#   ansible-playbook -i playbooks/00_local/inventory.ini playbooks/00_local/set_user_tier_premium.yml -e tier=promotional
#   ansible-playbook ... -e tier=regular -e user_id=ANOTHER_USER_OBJECT_ID
- name: Load app_dev/.env for MongoDB password (optional)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    local_env_path: "{{ playbook_dir }}/../../.env"
    mongodb_container_name: "dutch_external_app_mongodb"
  tasks:
    - name: Check if app_dev/.env exists
      stat:
        path: "{{ local_env_path }}"
      register: local_env_check

    - name: Parse app_dev/.env into JSON
      shell: |
        python3 << 'PYEOF'
        import json, os, re
        path = os.environ.get('LOCAL_ENV_PATH', '')
        out = {}
        if path and os.path.isfile(path):
            with open(path) as f:
                for line in f:
                    line = line.strip()
                    if not line or line.startswith('#'): continue
                    m = re.match(r'^([A-Za-z_][A-Za-z0-9_]*)=(.*)$', line)
                    if m:
                        k, v = m.group(1), m.group(2).strip().strip('"').strip("'")
                        out[k] = v
        result = { 'mongodb_password': out.get('MONGODB_PASSWORD', '') }
        print(json.dumps(result))
        PYEOF
      register: env_json
      changed_when: false
      environment:
        LOCAL_ENV_PATH: "{{ local_env_path }}"
      when: local_env_check.stat.exists | default(false)

    - name: Set env facts from app_dev/.env
      set_fact:
        mongodb_password: "{{ (env_json.stdout | from_json).mongodb_password }}"
      when: local_env_check.stat.exists | default(false) and env_json.stdout | length > 0

- name: Set user subscription_tier (local Docker)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    mongodb_password: "{{ (hostvars['localhost'] | default({})).get('mongodb_password') or lookup('env', 'MONGODB_PASSWORD') | default('6R3jjsvVhIRP20zMiHdkBzNKx') }}"
    mongodb_container_name: "dutch_external_app_mongodb"
    target_user_id: "{{ user_id | default('69aae0b0095ba0c771e43091') }}"
    tier: "{{ tier | default('premium') | lower }}"
    allowed_tiers: ["promotional", "regular", "premium"]
  tasks:
    - name: Validate tier argument
      assert:
        that: tier in allowed_tiers
        fail_msg: "tier must be one of {{ allowed_tiers | join(', ') }}. Got: {{ tier }}"
      run_once: true

    - name: Set subscription_tier via mongosh
      shell: |
        docker exec {{ mongodb_container_name }} mongosh -u external_app_user -p "{{ mongodb_password }}" --authenticationDatabase external_system --quiet --eval "
        var d = db.getSiblingDB('external_system');
        var userId = '{{ target_user_id }}';
        var tier = '{{ tier }}';
        var result = d.users.updateOne(
          { _id: ObjectId(userId) },
          { \$set: { 'modules.dutch_game.subscription_tier': tier, updated_at: new Date().toISOString() } }
        );
        if (result.matchedCount === 0) { print('ERROR: User ' + userId + ' not found'); quit(1); }
        print('OK: Set subscription_tier to ' + tier + ' for user ' + userId);
        "
      register: tier_out
      changed_when: true

    - name: Show result
      debug:
        msg: "{{ tier_out.stdout_lines }}"
