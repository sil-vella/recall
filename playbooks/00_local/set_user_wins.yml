---
# Set a user's modules.dutch_game.wins in local MongoDB by fixed user_id,
# and recompute level/rank from progression_config.json (same rules as Python backend).
# Run:
#   ansible-playbook -i playbooks/00_local/inventory.ini playbooks/00_local/set_user_wins.yml
#   ansible-playbook ... --extra-vars "target_wins_input=159"
- name: Load app_dev/.env.local for MongoDB and optional progression overrides
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    local_env_path: "{{ playbook_dir }}/../../.env.local"
    mongodb_container_name: "dutch_external_app_mongodb"
  tasks:
    - name: Check if app_dev/.env.local exists
      stat:
        path: "{{ local_env_path }}"
      register: local_env_check

    - name: Parse app_dev/.env.local into JSON
      shell: |
        python3 << 'PYEOF'
        import json, os, re
        path = os.environ.get('LOCAL_ENV_PATH', '')
        out = {}
        if path and os.path.isfile(path):
            with open(path) as f:
                for line in f:
                    line = line.strip()
                    if not line or line.startswith('#'):
                        continue
                    m = re.match(r'^([A-Za-z_][A-Za-z0-9_]*)=(.*)$', line)
                    if m:
                        k, v = m.group(1), m.group(2).strip().strip('"').strip("'")
                        out[k] = v
        result = {
            'mongodb_password': out.get('MONGODB_PASSWORD', ''),
            'dutch_progression_path': out.get('DUTCH_PROGRESSION_PATH', ''),
            'dutch_progression_json': out.get('DUTCH_PROGRESSION_JSON', ''),
        }
        print(json.dumps(result))
        PYEOF
      register: env_json
      changed_when: false
      environment:
        LOCAL_ENV_PATH: "{{ local_env_path }}"
      when: local_env_check.stat.exists | default(false)

    - name: Set env facts from app_dev/.env.local
      set_fact:
        mongodb_password: "{{ (env_json.stdout | from_json).mongodb_password }}"
        dutch_progression_path_env: "{{ (env_json.stdout | from_json).dutch_progression_path }}"
        dutch_progression_json_env: "{{ (env_json.stdout | from_json).dutch_progression_json }}"
      when: local_env_check.stat.exists | default(false) and env_json.stdout | length > 0

- name: Set user wins and derived level/rank (local Docker)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_wins_input
      prompt: "Enter target wins (whole number >= 0)"
      private: false
  vars:
    mongodb_password: "{{ (hostvars['localhost'] | default({})).get('mongodb_password') or lookup('env', 'MONGODB_PASSWORD') | default('6R3jjsvVhIRP20zMiHdkBzNKx') }}"
    mongodb_container_name: "dutch_external_app_mongodb"
    target_user_id: "69aae0b0095ba0c771e43091"
    python_base_root: "{{ playbook_dir }}/../../python_base_04"
    progression_config_path: "{{ playbook_dir }}/../../python_base_04/core/modules/dutch_game/config/progression_config.json"
  tasks:
    - name: Validate target wins input
      assert:
        that:
          - target_wins_input is match('^[0-9]+$')
        fail_msg: "Wins must be an integer >= 0."

    - name: Compute level and rank from progression_config.json (SSOT)
      shell: |
        python3 << 'PYEOF'
        import json, os, sys
        root = os.environ.get("PYTHON_BASE_ROOT", "")
        if root:
            sys.path.insert(0, root)
        path = (os.environ.get("DUTCH_PROGRESSION_PATH") or "").strip()
        if not path:
            path = (os.environ.get("PROGRESSION_CONFIG_DEFAULT") or "").strip()
        if path:
            os.environ["DUTCH_PROGRESSION_PATH"] = path
        overlay = (os.environ.get("DUTCH_PROGRESSION_JSON") or "").strip()
        if overlay:
            os.environ["DUTCH_PROGRESSION_JSON"] = overlay
        wins = int(os.environ.get("TARGET_WINS", "0"))
        from core.modules.dutch_game.wins_level_rank_matcher import WinsLevelRankMatcher as W
        from core.modules.dutch_game import progression_catalog as pc
        level = W.wins_to_user_level(wins)
        rank = W.user_level_to_rank(level)
        print(
            json.dumps(
                {
                    "target_wins": wins,
                    "normalized_level": level,
                    "target_rank": rank,
                    "wins_per_user_level": pc.WINS_PER_USER_LEVEL,
                    "levels_per_rank_by_rank": pc.LEVELS_PER_RANK_MAP,
                    "rank_hierarchy": list(pc.RANK_HIERARCHY),
                    "progression_config_revision": pc.PROGRESSION_CONFIG_REVISION,
                    "progression_config_path": path or str(pc._DEFAULT_JSON_PATH),
                }
            )
        )
        PYEOF
      register: progression_compute_out
      changed_when: false
      environment:
        PYTHON_BASE_ROOT: "{{ python_base_root }}"
        TARGET_WINS: "{{ target_wins_input }}"
        DUTCH_PROGRESSION_PATH: "{{ (hostvars['localhost'] | default({})).get('dutch_progression_path_env') | default('') | trim }}"
        DUTCH_PROGRESSION_JSON: "{{ (hostvars['localhost'] | default({})).get('dutch_progression_json_env') | default('') | trim }}"
        PROGRESSION_CONFIG_DEFAULT: "{{ progression_config_path }}"

    - name: Extract progression compute JSON line
      set_fact:
        progression_compute_json_line: "{{ (progression_compute_out.stdout_lines | select('match', '^\\{') | list | first) | default('') }}"

    - name: Fail if progression compute produced no JSON
      fail:
        msg: "Failed to compute level/rank from progression_config.json. stdout={{ progression_compute_out.stdout }}"
      when: progression_compute_json_line | length == 0

    - name: Parse progression compute result
      set_fact:
        progression_compute: >-
          {{
            progression_compute_json_line
            if (progression_compute_json_line is mapping)
            else (progression_compute_json_line | from_json)
          }}

    - name: Set target wins, level, and rank from progression compute
      set_fact:
        target_wins: "{{ progression_compute.target_wins }}"
        normalized_level: "{{ progression_compute.normalized_level }}"
        target_rank: "{{ progression_compute.target_rank }}"

    - name: Lookup user by target user_id and read current wins/level/rank
      shell: |
        docker exec {{ mongodb_container_name }} mongosh -u external_app_user -p "{{ mongodb_password }}" --authenticationDatabase external_system --quiet --eval "
        var d = db.getSiblingDB('external_system');
        var user = d.users.findOne(
          { _id: ObjectId('{{ target_user_id }}') },
          { _id: 1, email: 1, 'modules.dutch_game.wins': 1, 'modules.dutch_game.level': 1, 'modules.dutch_game.rank': 1 }
        );
        if (!user) { print('NOT_FOUND'); quit(0); }
        var winsBefore = null;
        var levelBefore = null;
        var rankBefore = null;
        if (user.modules && user.modules.dutch_game) {
          if (typeof user.modules.dutch_game.wins !== 'undefined') {
            winsBefore = user.modules.dutch_game.wins;
          }
          if (typeof user.modules.dutch_game.level !== 'undefined') {
            levelBefore = user.modules.dutch_game.level;
          }
          if (typeof user.modules.dutch_game.rank !== 'undefined') {
            rankBefore = user.modules.dutch_game.rank;
          }
        }
        print(JSON.stringify({
          user_id: user._id.valueOf(),
          email: user.email,
          wins_before: winsBefore,
          level_before: levelBefore,
          rank_before: rankBefore
        }));
        "
      register: user_lookup_out
      changed_when: false

    - name: Extract lookup JSON line
      set_fact:
        user_lookup_json_line: "{{ (user_lookup_out.stdout_lines | select('match', '^\\{') | list | first) | default('') }}"

    - name: Fail if target user not found
      fail:
        msg: "User with _id '{{ target_user_id }}' not found."
      when: user_lookup_json_line | length == 0

    - name: Parse user lookup data
      set_fact:
        user_lookup_data: >-
          {{
            user_lookup_json_line
            if (user_lookup_json_line is mapping)
            else (user_lookup_json_line | from_json)
          }}

    - name: Update wins, level, rank, and timestamps via mongosh
      shell: |
        docker exec {{ mongodb_container_name }} mongosh -u external_app_user -p "{{ mongodb_password }}" --authenticationDatabase external_system --quiet --eval "
        var d = db.getSiblingDB('external_system');
        var userId = '{{ user_lookup_data.user_id }}';
        var targetWins = {{ target_wins }};
        var normalizedLevel = {{ normalized_level }};
        var targetRank = '{{ target_rank }}';
        var nowIso = new Date().toISOString();
        var result = d.users.updateOne(
          { _id: ObjectId(userId) },
          { \$set: {
              'modules.dutch_game.wins': targetWins,
              'modules.dutch_game.level': normalizedLevel,
              'modules.dutch_game.rank': targetRank,
              updated_at: nowIso,
              'modules.dutch_game.last_updated': nowIso
            }
          }
        );
        if (result.matchedCount === 0) { print('ERROR: User not found by _id ' + userId); quit(1); }
        print('OK: Updated wins to ' + targetWins + ', level to ' + normalizedLevel + ', and rank to ' + targetRank + ' for user ' + userId);
        "
      register: wins_update_out
      changed_when: true

    - name: Read updated wins/level/rank after update
      shell: |
        docker exec {{ mongodb_container_name }} mongosh -u external_app_user -p "{{ mongodb_password }}" --authenticationDatabase external_system --quiet --eval "
        var d = db.getSiblingDB('external_system');
        var userId = '{{ user_lookup_data.user_id }}';
        var user = d.users.findOne(
          { _id: ObjectId(userId) },
          { _id: 1, 'modules.dutch_game.wins': 1, 'modules.dutch_game.level': 1, 'modules.dutch_game.rank': 1 }
        );
        if (!user) { print('NOT_FOUND'); quit(1); }
        var winsAfter = null;
        var levelAfter = null;
        var rankAfter = null;
        if (user.modules && user.modules.dutch_game) {
          if (typeof user.modules.dutch_game.wins !== 'undefined') {
            winsAfter = user.modules.dutch_game.wins;
          }
          if (typeof user.modules.dutch_game.level !== 'undefined') {
            levelAfter = user.modules.dutch_game.level;
          }
          if (typeof user.modules.dutch_game.rank !== 'undefined') {
            rankAfter = user.modules.dutch_game.rank;
          }
        }
        print(JSON.stringify({
          user_id: user._id.valueOf(),
          wins_after: winsAfter,
          level_after: levelAfter,
          rank_after: rankAfter
        }));
        "
      register: user_after_out
      changed_when: false

    - name: Extract after JSON line
      set_fact:
        user_after_json_line: "{{ (user_after_out.stdout_lines | select('match', '^\\{') | list | first) | default('') }}"

    - name: Parse after data
      set_fact:
        user_after_data: >-
          {{
            user_after_json_line
            if (user_after_json_line is mapping)
            else (user_after_json_line | from_json)
          }}

    - name: Show before/after summary and progression SSOT inputs
      debug:
        msg:
          - "Email: {{ user_lookup_data.email }}"
          - "User ID: {{ user_lookup_data.user_id }}"
          - "Progression SSOT: {{ progression_compute.progression_config_path }}"
          - "Revision: {{ progression_compute.progression_config_revision }}"
          - "wins_per_user_level: {{ progression_compute.wins_per_user_level }}"
          - "levels_per_rank: {{ progression_compute.levels_per_rank_by_rank }}"
          - "Requested wins: {{ target_wins }}"
          - "Computed level: {{ normalized_level }}, rank: {{ target_rank }}"
          - "Before -> wins: {{ user_lookup_data.wins_before }}, level: {{ user_lookup_data.level_before }}, rank: {{ user_lookup_data.rank_before }}"
          - "After  -> wins: {{ user_after_data.wins_after }}, level: {{ user_after_data.level_after }}, rank: {{ user_after_data.rank_after }}"
          - "Update output: {{ wins_update_out.stdout_lines | join(' ') }}"
