---
# Load app_dev/.env.prod so MONGODB_PASSWORD is available (no manual export needed).
- name: Load app_dev/.env.prod for MongoDB password (optional)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    local_env_path: "{{ playbook_dir }}/../../.env.prod"
  tasks:
    - name: Check if app_dev/.env.prod exists
      stat:
        path: "{{ local_env_path }}"
      register: local_env_check

    - name: Parse app_dev/.env.prod into JSON
      shell: |
        python3 << 'PYEOF'
        import json, os, re
        path = os.environ.get('LOCAL_ENV_PATH', '')
        out = {}
        if path and os.path.isfile(path):
            with open(path) as f:
                for line in f:
                    line = line.strip()
                    if not line or line.startswith('#'): continue
                    m = re.match(r'^([A-Za-z_][A-Za-z0-9_]*)=(.*)$', line)
                    if m:
                        k, v = m.group(1), m.group(2).strip().strip('"').strip("'")
                        out[k] = v
        result = { 'mongodb_password': out.get('MONGODB_PASSWORD', '') }
        print(json.dumps(result))
        PYEOF
      register: env_json
      changed_when: false
      environment:
        LOCAL_ENV_PATH: "{{ local_env_path }}"
      when: local_env_check.stat.exists | default(false)

    - name: Set env facts from app_dev/.env.prod
      set_fact:
        mongodb_password: "{{ (env_json.stdout | from_json).mongodb_password }}"
      when: local_env_check.stat.exists | default(false) and env_json.stdout | length > 0

- name: Add Missing Modules to Existing Database (Non-Destructive, Remote Docker)
  hosts: "{{ (vm_name | default('rop01')) }}_user"
  become: true
  vars:
    mongodb_container_name: "dutch_external_app_mongodb"
    database_name: "external_system"
    app_user: "external_app_user"
    # From play 1 (app_dev/.env.prod) or -e mongodb_password=... or export MONGODB_PASSWORD.
    mongodb_password: ""
    app_password: "{{ (hostvars['localhost'] | default({})).get('mongodb_password') or lookup('env', 'MONGODB_PASSWORD') | default(mongodb_password) }}"

    # MongoDB connection details for VPS Docker host
    mongodb_host: "localhost"
    mongodb_port: "27018"  # Host port mapped to MongoDB
    mongodb_auth_db: "external_system"

  tasks:
    - name: Wait for MongoDB container to be ready
      shell: docker exec {{ mongodb_container_name }} mongosh --eval "db.adminCommand('ping')" --quiet
      register: mongodb_ready
      retries: 30
      delay: 2
      until: mongodb_ready.rc == 0
      changed_when: mongodb_ready.rc == 0

    - name: Create module update script
      copy:
        dest: "/tmp/add_missing_modules.js"
        content: |
          // MongoDB Module Update Script
          // Adds missing modules to existing users without erasing data
          
          // Switch to the external_system database
          db = db.getSiblingDB('external_system');
          
          print("🔧 Adding Missing Modules to Existing Database...");
          print("=============================================");
          
          // Get current timestamp
          var currentTime = new Date();
          
          // ========================================
          // 1. UPDATE USER_MODULES REGISTRY
          // ========================================
          print("\n📋 Step 1: Updating user_modules registry...");
          
          // Check and add in_app_purchases module
          var inAppPurchasesModule = db.user_modules.findOne({ "module_name": "in_app_purchases" });
          if (!inAppPurchasesModule) {
            print("  ➕ Adding in_app_purchases module to registry...");
            db.user_modules.insertOne({
              "_id": ObjectId("507f1f77bcf86cd799439104"),
              "module_name": "in_app_purchases",
              "display_name": "In-App Purchases Module",
              "description": "In-app purchase and subscription management",
              "status": "active",
              "version": "1.0.0",
              "schema": {
                "enabled": "boolean",
                "active_purchases": "array",
                "subscription_status": "string",
                "last_purchase_date": "date",
                "total_spent": "number",
                "currency": "string",
                "last_updated": "date"
              },
              "created_at": currentTime,
              "updated_at": currentTime
            });
            print("  ✅ in_app_purchases module added to registry");
          } else {
            print("  ✓ in_app_purchases module already exists in registry");
          }
          
          // Check and add dutch_game module
          var dutchGameModule = db.user_modules.findOne({ "module_name": "dutch_game" });
          if (!dutchGameModule) {
            print("  ➕ Adding dutch_game module to registry...");
            db.user_modules.insertOne({
              "_id": ObjectId("507f1f77bcf86cd799439105"),
              "module_name": "dutch_game",
              "display_name": "Dutch Game Module",
              "description": "Dutch card game statistics and progression",
              "status": "active",
              "version": "1.0.0",
              "schema": {
                "enabled": "boolean",
                "wins": "number",
                "losses": "number",
                "total_matches": "number",
                "points": "number",
                "coins": "number",
                "level": "number",
                "rank": "string",
                "win_rate": "number",
                "subscription_tier": "string",
                "last_match_date": "date",
                "last_updated": "date"
              },
              "created_at": currentTime,
              "updated_at": currentTime
            });
            print("  ✅ dutch_game module added to registry");
          } else {
            // Check if coins field exists in schema, if not add it
            var needsSchemaUpdate = false;
            var schemaUpdates = {};
            
            if (!dutchGameModule.schema || !dutchGameModule.schema.coins) {
              needsSchemaUpdate = true;
              schemaUpdates["schema.coins"] = "number";
            }
            
            // Check if subscription_tier field exists in schema, if not add it
            if (!dutchGameModule.schema || !dutchGameModule.schema.subscription_tier) {
              needsSchemaUpdate = true;
              schemaUpdates["schema.subscription_tier"] = "string";
            }
            
            if (needsSchemaUpdate) {
              print("  🔄 Updating dutch_game module schema to include missing fields...");
              schemaUpdates["updated_at"] = currentTime;
              db.user_modules.updateOne(
                { "module_name": "dutch_game" },
                { "$set": schemaUpdates }
              );
              print("  ✅ dutch_game module schema updated with missing fields");
            } else {
              print("  ✓ dutch_game module already exists in registry with all required fields");
            }
          }
          
          // ========================================
          // 2. UPDATE EXISTING USERS
          // ========================================
          print("\n👥 Step 2: Updating existing users with missing modules...");
          
          var usersUpdated = 0;
          var usersSkipped = 0;
          
          // Find all users
          var users = db.users.find({}).toArray();
          print("  Found " + users.length + " users to check");
          
          users.forEach(function(user) {
            var needsUpdate = false;
            var updateFields = {};
            
            // Check for profile.picture field
            if (!user.profile || user.profile.picture === undefined) {
              needsUpdate = true;
              if (!user.profile) {
                updateFields["profile"] = {};
              }
              updateFields["profile.picture"] = "";
              print("  🔄 Adding picture field to profile for user: " + user.username + " (" + user.email + ")");
            }
            
            // Check for in_app_purchases module
            if (!user.modules || !user.modules.in_app_purchases) {
              needsUpdate = true;
              updateFields["modules.in_app_purchases"] = {
                "enabled": true,
                "active_purchases": [],
                "subscription_status": "none",
                "last_purchase_date": null,
                "total_spent": 0,
                "currency": "USD",
                "last_updated": currentTime
              };
              print("  ➕ Adding in_app_purchases to user: " + user.username + " (" + user.email + ")");
            }
            
            // Check for dutch_game module
            if (!user.modules || !user.modules.dutch_game) {
              needsUpdate = true;
              updateFields["modules.dutch_game"] = {
                "enabled": true,
                "wins": 0,
                "losses": 0,
                "total_matches": 0,
                "points": 0,
                "coins": 0,
                "level": 1,
                "rank": "beginner",
                "win_rate": 0.0,
                "subscription_tier": "promotional",
                "last_match_date": null,
                "last_updated": currentTime
              };
              print("  ➕ Adding dutch_game to user: " + user.username + " (" + user.email + ")");
            } else if (user.modules.dutch_game) {
              // Update existing dutch_game module to add missing fields (coins, subscription_tier)
              var needsDutchUpdate = false;
              if (user.modules.dutch_game.coins === undefined) {
                needsUpdate = true;
                needsDutchUpdate = true;
                updateFields["modules.dutch_game.coins"] = 0;
                print("  🔄 Adding coins field to existing dutch_game for user: " + user.username + " (" + user.email + ")");
              }
              if (user.modules.dutch_game.subscription_tier === undefined) {
                needsUpdate = true;
                needsDutchUpdate = true;
                updateFields["modules.dutch_game.subscription_tier"] = "promotional";
                print("  🔄 Adding subscription_tier field to existing dutch_game for user: " + user.username + " (" + user.email + ")");
              } else if (user.modules.dutch_game.subscription_tier === "free") {
                // Update old "free" values to "promotional"
                needsUpdate = true;
                needsDutchUpdate = true;
                updateFields["modules.dutch_game.subscription_tier"] = "promotional";
                print("  🔄 Updating subscription_tier from 'free' to 'promotional' for user: " + user.username + " (" + user.email + ")");
              }
              if (needsDutchUpdate) {
                updateFields["modules.dutch_game.last_updated"] = currentTime;
              }
            }
            
            // Update user if needed
            if (needsUpdate) {
              // Ensure modules object exists
              if (!user.modules) {
                updateFields["modules"] = {};
              }
              
              // Build update query
              var updateQuery = { "$set": updateFields };
              updateQuery["$set"]["updated_at"] = currentTime;
              
              db.users.updateOne(
                { "_id": user._id },
                updateQuery
              );
              usersUpdated++;
            } else {
              usersSkipped++;
            }
          });
          
          print("\n  ✅ Users updated: " + usersUpdated);
          print("  ✓ Users already up-to-date: " + usersSkipped);
          
          // ========================================
          // 3. ADD is_comp_player FIELD TO USERS
          // ========================================
          print("\n🤖 Step 3: Adding is_comp_player field to users...");
          
          // Create index for is_comp_player field
          try {
            db.users.createIndex({ "is_comp_player": 1 });
            print("  ✅ Created index on is_comp_player field");
          } catch (e) {
            // Index might already exist, that's okay
            print("  ✓ Index on is_comp_player field already exists or created");
          }
          
          // Update all users to add is_comp_player: false if missing
          var compPlayerUpdateResult = db.users.updateMany(
            { "is_comp_player": { $exists: false } },
            { $set: { "is_comp_player": false, "updated_at": currentTime } }
          );
          
          if (compPlayerUpdateResult.modifiedCount > 0) {
            print("  ✅ Added is_comp_player: false to " + compPlayerUpdateResult.modifiedCount + " users");
          } else {
            print("  ✓ All users already have is_comp_player field");
          }
          
          // Verify the field exists
          var usersWithField = db.users.countDocuments({ "is_comp_player": { $exists: true } });
          var totalUsers = db.users.countDocuments({});
          print("  📊 Users with is_comp_player field: " + usersWithField + " / " + totalUsers);

          // ========================================
          // 3b. ADD role FIELD TO USERS (default: player)
          // ========================================
          print("\n👤 Step 3b: Adding role field to users (default: player)...");
          try {
            db.users.createIndex({ "role": 1 });
            print("  ✅ Created index on role field");
          } catch (e) {
            print("  ✓ Index on role field already exists or created");
          }
          var roleUpdateResult = db.users.updateMany(
            { "role": { $exists: false } },
            { $set: { "role": "player", "updated_at": currentTime } }
          );
          if (roleUpdateResult.modifiedCount > 0) {
            print("  ✅ Added role: 'player' to " + roleUpdateResult.modifiedCount + " users");
          } else {
            print("  ✓ All users already have role field");
          }
          var usersWithRole = db.users.countDocuments({ "role": { $exists: true } });
          print("  📊 Users with role field: " + usersWithRole + " / " + totalUsers);

          // ========================================
          // 4. ENSURE NOTIFICATIONS COLLECTION EXISTS
          // ========================================
          // See Documentation/Dutch_game/NOTIFICATION_SYSTEM.md
          print("\n📬 Step 4: Ensuring notifications collection exists...");
          var colls = db.getCollectionNames();
          if (colls.indexOf("notifications") === -1) {
            db.createCollection("notifications");
            db.notifications.createIndex({ "user_id": 1 });
            db.notifications.createIndex({ "user_id": 1, "read_at": 1 });
            db.notifications.createIndex({ "created_at": -1 });
            print("  ✅ Created notifications collection with indexes");
          } else {
            print("  ✓ Notifications collection already exists");
          }

          // ========================================
          // 5. ENSURE TOURNAMENTS COLLECTION EXISTS
          // ========================================
          // Schema:
          //   tournament_id (string, from date/time of creation)
          //   name (string)
          //   status (string, default "pending")
          //   type (optional, e.g. IRL, Online)
          //   format (optional, e.g. League, Cup)
          //   start_date (optional)
          //   matches (array of match docs)
          //   Each match: match_id, status ("pending"), start_date (optional), room_id, winner, players (array)
          //   Each player: user_id, username, email, points, number_of_cards_left (array of { card_rank, card_suite })
          print("\n🏆 Step 5: Ensuring tournaments collection exists...");
          var collsNow = db.getCollectionNames();
          if (collsNow.indexOf("tournaments") === -1) {
            db.createCollection("tournaments");
            db.tournaments.createIndex({ "_id": 1 });
            db.tournaments.createIndex({ "tournament_id": 1 }, { unique: true });
            db.tournaments.createIndex({ "name": 1 });
            db.tournaments.createIndex({ "status": 1 });
            db.tournaments.createIndex({ "type": 1 });
            db.tournaments.createIndex({ "format": 1 });
            db.tournaments.createIndex({ "start_date": 1 });
            db.tournaments.createIndex({ "matches.match_id": 1 });
            db.tournaments.createIndex({ "matches.status": 1 });
            db.tournaments.createIndex({ "matches.room_id": 1 });
            print("  ✅ Created tournaments collection with indexes");
            print("  📋 Schema: tournament_id, name, status (default pending), type (optional, e.g. IRL, Online), format (optional, e.g. League, Cup), start_date (optional), matches ([{ match_id, status (pending), start_date (optional), room_id, winner, players ([{ user_id, username, email, points, number_of_cards_left ([{ card_rank, card_suite }]) }]) }])");
          } else {
            print("  ✓ Tournaments collection already exists");
            try {
              db.tournaments.createIndex({ "tournament_id": 1 }, { unique: true });
              db.tournaments.createIndex({ "name": 1 });
              db.tournaments.createIndex({ "status": 1 });
              db.tournaments.createIndex({ "type": 1 });
              db.tournaments.createIndex({ "format": 1 });
              db.tournaments.createIndex({ "start_date": 1 });
              db.tournaments.createIndex({ "matches.match_id": 1 });
              db.tournaments.createIndex({ "matches.status": 1 });
              db.tournaments.createIndex({ "matches.room_id": 1 });
              print("  ✓ Ensured tournament indexes exist");
            } catch (e) {
              if (e.code !== 85 && e.code !== 86) { throw e; }
            }
          }

          // ========================================
          // 6. STRIPE + WALLETS COLLECTIONS (parity with local docker-compose dev DB)
          // ========================================
          // Local external_system includes empty stripe_coin_purchases + wallets with _id index only.
          print("\n💳 Step 6: Ensuring stripe_coin_purchases and wallets collections (local structure parity)...");
          var allColls = db.getCollectionNames();
          ["stripe_coin_purchases", "wallets"].forEach(function (collName) {
            if (allColls.indexOf(collName) === -1) {
              db.createCollection(collName);
              print("  ✅ Created collection: " + collName + " (_id only)");
            } else {
              print("  ✓ Collection already exists: " + collName);
            }
          });

          // RevenueCat coin ledger + webhook dedup (unique indexes for idempotency)
          print("\n💳 Step 6b: revenuecat_coin_purchases + revenuecat_webhook_events indexes...");
          ["revenuecat_coin_purchases", "revenuecat_webhook_events"].forEach(function (collName) {
            if (db.getCollectionNames().indexOf(collName) === -1) {
              db.createCollection(collName);
              print("  ✅ Created collection: " + collName);
            }
          });
          try {
            db.revenuecat_coin_purchases.createIndex(
              { store_transaction_id: 1 },
              { unique: true, name: "store_transaction_id_unique" }
            );
            print("  ✅ revenuecat_coin_purchases.store_transaction_id unique");
          } catch (e) {
            if (e.code !== 85 && e.code !== 86) { throw e; }
            print("  ✓ revenuecat_coin_purchases index already exists");
          }
          print("  ✓ revenuecat_webhook_events: event id stored as _id (unique by default)");

          // ========================================
          // 7. TOURNAMENTS INDEXES — align with local (drop indexes present on VPS but not on local dev)
          // ========================================
          // Local dev tournaments indexes: _id_, format_1, matches.*, name_1, start_date_1, status_1,
          // tournament_id_1, type_1. VPS may have extra: creator_id_1, user_ids_1, created_at_-1, updated_at_-1.
          print("\n🏆 Step 7: Aligning tournaments indexes with local dev (safe drops only)...");
          if (db.getCollectionNames().indexOf("tournaments") !== -1) {
            var dropThese = ["creator_id_1", "user_ids_1", "created_at_-1", "updated_at_-1"];
            var idxNames = db.tournaments.getIndexes().map(function (i) { return i.name; });
            dropThese.forEach(function (idxName) {
              if (idxNames.indexOf(idxName) === -1) {
                print("  ✓ Index not present (skip): " + idxName);
                return;
              }
              try {
                db.tournaments.dropIndex(idxName);
                print("  ✅ Dropped tournaments index: " + idxName);
              } catch (e) {
                print("  ⚠️ Could not drop index " + idxName + ": " + e);
              }
            });
          } else {
            print("  ✓ No tournaments collection — skip index alignment");
          }

          // ========================================
          // 8. LEADERBOARDS COLLECTION (cron snapshots via Flask — see 14_leaderboard_cron.yml)
          // ========================================
          // leaderboard_type: "daily" | "monthly" | "yearly" | "tournament"
          // For leaderboard_type === "tournament": set tournament_type + tournament_format (e.g. IRL/Online × League/Cup)
          // winners: [ { user_id, username?, rank? } ] — one doc per resolved period / tournament snapshot
          // date_time: UTC (BSON Date)
          // period_key: optional string bucket, e.g. "2026-03-29", "2026-03", "2026"
          print("\n📊 Step 8: Ensuring leaderboards collection exists...");
          var collsLb = db.getCollectionNames();
          if (collsLb.indexOf("leaderboards") === -1) {
            db.createCollection("leaderboards");
            print("  ✅ Created leaderboards collection");
          } else {
            print("  ✓ leaderboards collection already exists");
          }
          try {
            db.leaderboards.createIndex({ "leaderboard_type": 1, "date_time": -1 });
            db.leaderboards.createIndex({ "period_key": 1, "leaderboard_type": 1 });
            db.leaderboards.createIndex({
              "leaderboard_type": 1,
              "tournament_type": 1,
              "tournament_format": 1,
              "date_time": -1
            });
            db.leaderboards.createIndex({ "date_time": -1 });
            print("  ✅ Ensured leaderboards indexes");
          } catch (e) {
            if (e.code !== 85 && e.code !== 86) { throw e; }
            print("  ✓ leaderboards indexes already present or partial create");
          }
          print("  📋 Doc shape: { leaderboard_type, date_time (UTC), winners[], optional period_key,");
          print("      for tournament: tournament_type, tournament_format }");

          // ========================================
          // 9. DUTCH MATCH WIN OUTCOMES (insert-only; period leaderboards aggregate from this)
          // ========================================
          // One document per winning player per match (human or comp). ended_at: UTC (BSON Date).
          // Unique (room_id, user_id) prevents double-count on replay; app uses insert_one only.
          print("\n📊 Step 9: Ensuring dutch_match_win_outcomes collection exists...");
          var collsMw = db.getCollectionNames();
          if (collsMw.indexOf("dutch_match_win_outcomes") === -1) {
            db.createCollection("dutch_match_win_outcomes");
            print("  ✅ Created dutch_match_win_outcomes collection");
          } else {
            print("  ✓ dutch_match_win_outcomes collection already exists");
          }
          try {
            db.dutch_match_win_outcomes.createIndex({ "ended_at": 1 });
            db.dutch_match_win_outcomes.createIndex(
              { "room_id": 1, "user_id": 1 },
              { unique: true, name: "room_user_unique" }
            );
            print("  ✅ Ensured dutch_match_win_outcomes indexes");
          } catch (e) {
            if (e.code !== 85 && e.code !== 86) { throw e; }
            print("  ✓ dutch_match_win_outcomes indexes already present or partial create");
          }
          print("  📋 Doc shape: { room_id (string), user_id (ObjectId), ended_at (UTC),");
          print("      is_tournament (bool), tournament_id (optional string), game_mode (optional string) }");

          // ========================================
          // FINAL SUMMARY
          // ========================================
          print("\n🎉 MODULE UPDATE COMPLETE!");
          print("=============================================");
          print("Summary:");
          print("- User modules registry: " + db.user_modules.countDocuments() + " modules");
          print("- Users in database: " + db.users.countDocuments());
          print("- Users updated: " + usersUpdated);
          print("- Users skipped (already up-to-date): " + usersSkipped);
          print("- Tournaments collection: " + (db.tournaments ? db.tournaments.countDocuments() : 0) + " docs");
          print("- stripe_coin_purchases: " + db.stripe_coin_purchases.countDocuments() + " docs");
          print("- wallets: " + db.wallets.countDocuments() + " docs");
          print("- Leaderboards collection: " + db.leaderboards.countDocuments() + " docs");
          print("- dutch_match_win_outcomes: " + db.dutch_match_win_outcomes.countDocuments() + " docs");
          print("\n✅ All missing modules have been added to existing users!");
        mode: '0644'

    - name: Copy update script to MongoDB container
      shell: docker cp /tmp/add_missing_modules.js {{ mongodb_container_name }}:/tmp/add_missing_modules.js
      register: copy_result
      changed_when: copy_result.rc == 0

    - name: Execute module update script
      shell: |
        docker exec {{ mongodb_container_name }} mongosh -u {{ app_user }} -p "{{ app_password }}" --authenticationDatabase {{ mongodb_auth_db }} --eval "$(cat /tmp/add_missing_modules.js)"
      register: update_result
      changed_when: true

    - name: Display update results
      debug:
        msg: "{{ update_result.stdout }}"

    - name: Verify module updates
      shell: |
        docker exec {{ mongodb_container_name }} mongosh -u {{ app_user }} -p "{{ app_password }}" --authenticationDatabase {{ mongodb_auth_db }} --eval "
          db = db.getSiblingDB('external_system');
          print('\\n📊 VERIFICATION SUMMARY:');
          print('=====================');
          print('Registered modules: ' + db.user_modules.countDocuments());
          print('Total users: ' + db.users.countDocuments());
          
          // Count users with each module
          var usersWithInApp = db.users.countDocuments({ 'modules.in_app_purchases': { \$exists: true } });
          var usersWithDutch = db.users.countDocuments({ 'modules.dutch_game': { \$exists: true } });
          
          print('Users with in_app_purchases: ' + usersWithInApp);
          print('Users with dutch_game: ' + usersWithDutch);
          
          // Verify is_comp_player field
          var usersWithCompPlayerField = db.users.countDocuments({ 'is_comp_player': { \$exists: true } });
          var compPlayersCount = db.users.countDocuments({ 'is_comp_player': true });
          var humanPlayersCount = db.users.countDocuments({ 'is_comp_player': false });
          
          print('\\n🤖 Comp Player Field Status:');
          print('Users with is_comp_player field: ' + usersWithCompPlayerField);
          print('Computer players (is_comp_player: true): ' + compPlayersCount);
          print('Human players (is_comp_player: false): ' + humanPlayersCount);
          
          // List comp players
          if (compPlayersCount > 0) {
            print('\\n🤖 Computer Players:');
            db.users.find({ \"is_comp_player\": true }, { username: 1, email: 1, \"modules.dutch_game.coins\": 1 }).forEach(function(player) {
              var coins = player.modules && player.modules.dutch_game ? player.modules.dutch_game.coins : 0;
              var playerInfo = \"  - \" + player.username + \" (\" + player.email + \") - \" + coins + \" coins\";
              print(playerInfo);
            });
          }
          
          // List registered modules
          print('\\n📋 Registered Modules:');
          db.user_modules.find({}, { module_name: 1, display_name: 1, status: 1 }).forEach(function(module) {
            print('  - ' + module.module_name + ' (' + module.display_name + ') - ' + module.status);
          });
          
          // Tournaments collection
          var tournamentsExist = db.getCollectionNames().indexOf('tournaments') !== -1;
          print('\\n🏆 Tournaments collection: ' + (tournamentsExist ? 'exists, ' + db.tournaments.countDocuments() + ' docs' : 'not present'));
          var lb = db.getCollectionNames().indexOf('leaderboards') >= 0 ? db.leaderboards.countDocuments() : 0;
          print('\\n📊 Leaderboards docs: ' + lb);
          var mw = db.getCollectionNames().indexOf('dutch_match_win_outcomes') >= 0 ? db.dutch_match_win_outcomes.countDocuments() : 0;
          print('📊 dutch_match_win_outcomes docs: ' + mw);
        "
      register: verification_summary
      changed_when: false

    - name: Display verification summary
      debug:
        msg: "{{ verification_summary.stdout }}"

