---
# Deploy leaderboard snapshot shell scripts to the VPS and install root crontab entries.
# Requires Flask endpoint POST /service/dutch/snapshot-wins-leaderboard (python_base_04) — rebuild/push
# dutch_flask_app image after pulling latest app code.
#
# Usage (from repo):
#   cd playbooks/rop01
#   ansible-playbook -i inventory.ini 14_leaderboard_cron.yml
#
# Optional: -e leaderboard_flask_base_url=http://127.0.0.1:5001
# Loads DART_BACKEND_SERVICE_KEY from app_dev/.env.prod on the control machine (same as other rop01 playbooks).

- name: Load app_dev/.env.prod for DART_BACKEND_SERVICE_KEY
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    local_env_path: "{{ playbook_dir }}/../../.env.prod"
  tasks:
    - name: Check if app_dev/.env.prod exists
      stat:
        path: "{{ local_env_path }}"
      register: local_env_check

    - name: Parse DART_BACKEND_SERVICE_KEY from app_dev/.env.prod
      shell: |
        python3 << 'PYEOF'
        import json, os, re
        path = os.environ.get('LOCAL_ENV_PATH', '')
        out = {}
        if path and os.path.isfile(path):
            with open(path) as f:
                for line in f:
                    line = line.strip()
                    if not line or line.startswith('#'):
                        continue
                    m = re.match(r'^([A-Za-z_][A-Za-z0-9_]*)=(.*)$', line)
                    if m:
                        k, v = m.group(1), m.group(2).strip().strip('"').strip("'")
                        out[k] = v
        print(json.dumps({"dart_backend_service_key": out.get("DART_BACKEND_SERVICE_KEY", "")}))
        PYEOF
      register: env_json
      changed_when: false
      environment:
        LOCAL_ENV_PATH: "{{ local_env_path }}"
      when: local_env_check.stat.exists | default(false)

    - name: Set key fact for template
      set_fact:
        dart_backend_service_key_from_env: "{{ (env_json.stdout | from_json).dart_backend_service_key }}"
      when: local_env_check.stat.exists | default(false) and env_json.stdout | default('') | length > 0

- name: Deploy leaderboard scripts and cron on VPS
  hosts: "{{ (vm_name | default('rop01')) }}_user"
  become: true
  vars:
    remote_leaderboard_dir: "/opt/apps/reignofplay/dutch/scripts/leaderboards"
    leaderboard_flask_base_url: "{{ leaderboard_flask_base_url | default('http://127.0.0.1:5001') }}"

  tasks:
    - name: Resolve DART_BACKEND_SERVICE_KEY (extra var > env > app_dev/.env.prod from localhost play)
      set_fact:
        _leaderboard_dart_key: >-
          {{
            dart_backend_service_key
            | default(lookup('env', 'DART_BACKEND_SERVICE_KEY', default=''), true)
            | default(hostvars['localhost']['dart_backend_service_key_from_env'] | default(''), true)
          }}

    - name: Require DART_BACKEND_SERVICE_KEY
      assert:
        that:
          - _leaderboard_dart_key | length > 0
        fail_msg: >-
          Set DART_BACKEND_SERVICE_KEY in app_dev/.env.prod, export it, or pass -e dart_backend_service_key=...

    - name: Create remote directory
      file:
        path: "{{ remote_leaderboard_dir }}"
        state: directory
        mode: "0755"

    - name: Install snapshot_monthly.sh
      copy:
        src: "{{ playbook_dir }}/scripts/leaderboards/snapshot_monthly.sh"
        dest: "{{ remote_leaderboard_dir }}/snapshot_monthly.sh"
        mode: "0755"
        force: true

    - name: Install snapshot_yearly.sh
      copy:
        src: "{{ playbook_dir }}/scripts/leaderboards/snapshot_yearly.sh"
        dest: "{{ remote_leaderboard_dir }}/snapshot_yearly.sh"
        mode: "0755"
        force: true

    - name: Deploy env.sh (secrets)
      template:
        src: "{{ playbook_dir }}/templates/leaderboard_env.sh.j2"
        dest: "{{ remote_leaderboard_dir }}/env.sh"
        mode: "0600"
      vars:
        dart_backend_service_key: "{{ _leaderboard_dart_key }}"

    - name: Cron — monthly wins snapshot (1st of month 00:05 UTC)
      cron:
        name: "Dutch leaderboard monthly (wins snapshot)"
        minute: "5"
        hour: "0"
        day: "1"
        month: "*"
        weekday: "*"
        user: root
        job: "{{ remote_leaderboard_dir }}/snapshot_monthly.sh >> /var/log/dutch_leaderboard_monthly.log 2>&1"

    - name: Cron — yearly wins snapshot (Jan 1 00:05 UTC)
      cron:
        name: "Dutch leaderboard yearly (wins snapshot)"
        minute: "5"
        hour: "0"
        day: "1"
        month: "1"
        weekday: "*"
        user: root
        job: "{{ remote_leaderboard_dir }}/snapshot_yearly.sh >> /var/log/dutch_leaderboard_yearly.log 2>&1"

    - name: Summary
      debug:
        msg: |
          Leaderboard scripts: {{ remote_leaderboard_dir }}/
          Logs: /var/log/dutch_leaderboard_monthly.log, /var/log/dutch_leaderboard_yearly.log
          Flask: POST {{ leaderboard_flask_base_url }}/service/dutch/snapshot-wins-leaderboard
          Ensure the production Flask image includes the new endpoint; redeploy if needed.
