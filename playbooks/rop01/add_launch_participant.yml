---
# One-off: add 3 computer players to participants of a tournament (by ID).
# Usage: from repo root, with .env loaded: ansible-playbook -i playbooks/rop01/inventory.ini playbooks/rop01/add_launch_participant.yml -e vm_name=rop01
- name: Add 3 comp players to tournament participants
  hosts: "{{ vm_name }}_user"
  become: true
  vars:
    mongodb_password: "{{ lookup('env', 'MONGODB_PASSWORD') | default('') }}"
    tournament_id: "69adeb5405b55a7d0122d60f"
    extra_usernames: ["silvestervella"]
  tasks:
    - name: Copy MongoDB script to target (templated with tournament_id)
      template:
        src: scripts/add_launch_participant.js.j2
        dest: /tmp/add_launch_participant.js
        mode: '0644'

    - name: Run script in MongoDB container (add 3 comp players to tournament)
      shell: |
        sg docker -c 'docker cp /tmp/add_launch_participant.js dutch_external_app_mongodb:/tmp/ && docker exec dutch_external_app_mongodb mongosh -u external_app_user -p "{{ mongodb_password }}" --authenticationDatabase external_system --quiet /tmp/add_launch_participant.js'
      register: script_out
      changed_when: true

    - name: Show result
      debug:
        msg: "{{ script_out.stdout_lines }}"
