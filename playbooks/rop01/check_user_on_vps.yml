---
# One-off: check user 69ad608e5cfa3eb1703c134a in VPS MongoDB (role, _id type). Uses same .env as set_user_role_admin.
- name: Load app_dev/.env for MongoDB
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    local_env_path: "{{ playbook_dir }}/../../.env"
  tasks:
    - name: Check if app_dev/.env exists
      stat:
        path: "{{ local_env_path }}"
      register: local_env_check

    - name: Parse app_dev/.env into JSON
      shell: |
        python3 << 'PYEOF'
        import json, os, re
        path = os.environ.get('LOCAL_ENV_PATH', '')
        out = {}
        if path and os.path.isfile(path):
            with open(path) as f:
                for line in f:
                    line = line.strip()
                    if not line or line.startswith('#'): continue
                    m = re.match(r'^([A-Za-z_][A-Za-z0-9_]*)=(.*)$', line)
                    if m:
                        k, v = m.group(1), m.group(2).strip().strip('"').strip("'")
                        out[k] = v
        result = { 'mongodb_password': out.get('MONGODB_PASSWORD', '') }
        print(json.dumps(result))
        PYEOF
      register: env_json
      changed_when: false
      environment:
        LOCAL_ENV_PATH: "{{ local_env_path }}"
      when: local_env_check.stat.exists | default(false)

    - name: Set env facts from app_dev/.env
      set_fact:
        mongodb_password: "{{ (env_json.stdout | from_json).mongodb_password }}"
      when: local_env_check.stat.exists | default(false) and env_json.stdout | length > 0

- name: Check user in VPS MongoDB
  hosts: "{{ vm_name | default('rop01') }}_user"
  become: true
  vars:
    mongodb_password: "{{ (hostvars['localhost'] | default({})).get('mongodb_password') or lookup('env', 'MONGODB_PASSWORD') | default('') }}"
  tasks:
    - name: Copy check script to target
      copy:
        src: scripts/check_user_role.js
        dest: /tmp/check_user_role.js
        mode: '0644'

    - name: Run check script in MongoDB container
      shell: |
        sg docker -c 'docker cp /tmp/check_user_role.js dutch_external_app_mongodb:/tmp/ && docker exec dutch_external_app_mongodb mongosh -u external_app_user -p "{{ mongodb_password }}" --authenticationDatabase external_system --quiet /tmp/check_user_role.js'
      register: check_out
      changed_when: false
      failed_when: false

    - name: Show user check result
      debug:
        msg: "{{ check_out.stdout_lines }}"
    - name: Show stderr if any
      debug:
        msg: "{{ check_out.stderr_lines }}"
      when: check_out.stderr_lines | length > 0
