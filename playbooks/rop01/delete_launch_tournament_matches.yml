---
# One-off: delete all matches of the "launch" tournament (keeps participants).
# Usage: from repo root, with .env loaded: ansible-playbook -i playbooks/rop01/inventory.ini playbooks/rop01/delete_launch_tournament_matches.yml -e vm_name=rop01
- name: Delete launch tournament matches
  hosts: "{{ vm_name }}_user"
  become: true
  vars:
    mongodb_password: "{{ lookup('env', 'MONGODB_PASSWORD') | default('') }}"
  tasks:
    - name: Copy delete_tournament_matches script to target
      copy:
        src: scripts/delete_tournament_matches.js
        dest: /tmp/delete_tournament_matches.js
        mode: '0644'

    - name: Run script in MongoDB container
      shell: |
        sg docker -c 'docker cp /tmp/delete_tournament_matches.js dutch_external_app_mongodb:/tmp/ && docker exec dutch_external_app_mongodb mongosh -u external_app_user -p "{{ mongodb_password }}" --authenticationDatabase external_system --quiet /tmp/delete_tournament_matches.js'
      register: script_out
      changed_when: true

    - name: Show result
      debug:
        msg: "{{ script_out.stdout_lines }}"
