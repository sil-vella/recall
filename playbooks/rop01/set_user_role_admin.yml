---
# One-off: set user 69ad608e5cfa3eb1703c134a (silvestervella) role to "admin" on VPS. Same structure as playbooks/00_local/set_user_role_admin.yml.
# Usage: from app_dev: ansible-playbook -i playbooks/rop01/inventory.ini playbooks/rop01/set_user_role_admin.yml -e vm_name=rop01
- name: Load app_dev/.env for MongoDB password (optional)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    local_env_path: "{{ playbook_dir }}/../../.env"
  tasks:
    - name: Check if app_dev/.env exists
      stat:
        path: "{{ local_env_path }}"
      register: local_env_check

    - name: Parse app_dev/.env into JSON
      shell: |
        python3 << 'PYEOF'
        import json, os, re
        path = os.environ.get('LOCAL_ENV_PATH', '')
        out = {}
        if path and os.path.isfile(path):
            with open(path) as f:
                for line in f:
                    line = line.strip()
                    if not line or line.startswith('#'): continue
                    m = re.match(r'^([A-Za-z_][A-Za-z0-9_]*)=(.*)$', line)
                    if m:
                        k, v = m.group(1), m.group(2).strip().strip('"').strip("'")
                        out[k] = v
        result = { 'mongodb_password': out.get('MONGODB_PASSWORD', '') }
        print(json.dumps(result))
        PYEOF
      register: env_json
      changed_when: false
      environment:
        LOCAL_ENV_PATH: "{{ local_env_path }}"
      when: local_env_check.stat.exists | default(false)

    - name: Set env facts from app_dev/.env
      set_fact:
        mongodb_password: "{{ (env_json.stdout | from_json).mongodb_password }}"
      when: local_env_check.stat.exists | default(false) and env_json.stdout | length > 0

- name: Set user 69ad608e5cfa3eb1703c134a role to admin (VPS Docker)
  hosts: "{{ vm_name }}_user"
  become: true
  gather_facts: false
  vars:
    mongodb_password: "{{ (hostvars['localhost'] | default({})).get('mongodb_password') or lookup('env', 'MONGODB_PASSWORD') | default('') }}"
    mongodb_container_name: "dutch_external_app_mongodb"
  tasks:
    - name: Create set_user_role_admin script (inline, same as 00_local)
      copy:
        dest: "/tmp/set_user_role_admin.js"
        content: |
          print("VPS set_user_role_admin: target user 69ad608e5cfa3eb1703c134a (silvestervella)");
          var d = db.getSiblingDB("external_system");
          var userId = "69ad608e5cfa3eb1703c134a";
          var result = d.users.updateOne(
            { _id: ObjectId(userId) },
            { $set: { role: "admin", updated_at: new Date().toISOString() } }
          );
          if (result.matchedCount === 0) {
            print("ERROR: User with _id " + userId + " not found");
            quit(1);
          }
          if (result.modifiedCount === 1) {
            print("OK: Set role to 'admin' for user " + userId);
          } else {
            print("OK: User " + userId + " already had role 'admin' (no change)");
          }
        mode: '0644'

    - name: Copy script to MongoDB container
      shell: sg docker -c 'docker cp /tmp/set_user_role_admin.js {{ mongodb_container_name }}:/tmp/set_user_role_admin.js'
      register: copy_out
      changed_when: copy_out.rc == 0

    - name: Run script in MongoDB container
      shell: |
        sg docker -c 'docker exec {{ mongodb_container_name }} mongosh -u external_app_user -p "{{ mongodb_password }}" --authenticationDatabase external_system --quiet /tmp/set_user_role_admin.js'
      register: script_out
      changed_when: true

    - name: Log script stdout to terminal
      debug:
        msg: "{{ script_out.stdout_lines | default([]) }}"

    - name: Log script stderr to terminal (if any)
      debug:
        msg: "{{ script_out.stderr_lines | default([]) }}"
      when: script_out.stderr_lines | default([]) | length > 0

    - name: Fail if script failed
      fail:
        msg: "MongoDB script failed: rc={{ script_out.rc }}, stderr={{ script_out.stderr | default('') }}"
      when: script_out.rc != 0
