<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dutch — Maintenance</title>
  <style>
    /* Theme aligned with flutter_base_05 ThemePreset.dutch (theme_consts.dart) */
    :root {
      --scaffold-bg: #2e1f2a;
      --accent-contrast: #5c3f54;
      --primary: #6b9950;
      --accent: #8bc34a;
      --text: #ffffff;
      --muted: #b0bec5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, var(--scaffold-bg) 0%, #1a1218 100%);
      color: var(--text);
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      padding: 2rem 1.75rem;
      border-radius: 12px;
      background: var(--accent-contrast);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(107, 153, 80, 0.25);
      text-align: center;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--accent);
    }
    p {
      margin: 0;
      line-height: 1.55;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .brand {
      display: inline-block;
      margin-bottom: 1.25rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--primary);
      font-weight: 600;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 1.5rem auto 0;
      border: 3px solid rgba(139, 195, 74, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="brand">Dutch</span>
    <h1>We&rsquo;re under maintenance</h1>
    <p>We&rsquo;re improving the experience. Please try again in a few minutes.</p>
    <div class="spinner" aria-hidden="true"></div>
  </div>
</body>
</html>
