# Promotional / gating manifest (uploaded as JSON; Flutter loads from API only).
#
# Source of truth for VPS upload: run playbooks/rop01/15_upload_promotional_bundle.py
#
# switch_screen: AdMob interstitial after [show_after_screen_changes] navigations.
#   delay_before_skip_seconds = countdown before Skip (black screen), then interstitial on native.
#   exclude_from_screen_change_count = destination paths that do NOT increment the counter.
#   Screen paths match GoRouter paths (e.g. /account). Optional prefix: /dutch* matches /dutch/...

ad_event_types:
  - id: switch_screen
    hook_name: switch_screen_ad
    selection_strategy: round_robin
    delay_before_skip_seconds: 10
    show_after_screen_changes: 3
    exclude_from_screen_change_count:
      - /dutch/game-play
      - /coin-purchase
      - /admin*

# Optional catalog rows (e.g. switch_screen) — not shown in UI; kept for server parity / future use.
ads:
  - id: mixta_promo
    ad_type_id: switch_screen
    link: "https://mixta.mt"
    title: "Mixta"
    image: mixta_promo.png

  - id: fittruck_promo_002
    ad_type_id: switch_screen
    link: "https://www.facebook.com/fittruckmalta"
    title: "Fit Truck"
    image: fittruck_promo_002.jpg
